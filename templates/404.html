{% extends "base.html" %}

{% block title %}Page Not Found{% endblock %}

{% block content %}
<div class="text-center py-5">
    <img src="{{ url_for('static', filename='assets/logo_icon.png') }}" 
         alt="SCOPE Logo" 
         style="width: 80px; height: 80px; margin-bottom: 20px; opacity: 0.7;"
         class="img-fluid">
    <i class="bi bi-exclamation-triangle" style="font-size: 5rem; color: #dc3545;"></i>
    <h1 class="display-1">404</h1>
    <h2>Page Not Found</h2>
    <p class="lead">The page you're looking for doesn't exist or has been moved.</p>
    <a href="{{ url_for('dashboard') }}" class="btn btn-primary">
        <i class="bi bi-house-door"></i> Return to Dashboard
    </a>
</div>
{% endblock %}
