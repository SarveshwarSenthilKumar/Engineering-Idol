{% extends "base.html" %}

{% block title %}Server Error{% endblock %}

{% block content %}
<div class="text-center py-5">
    <img src="{{ url_for('static', filename='assets/logo_icon.png') }}" 
         alt="SCOPE Logo" 
         style="width: 80px; height: 80px; margin-bottom: 20px; opacity: 0.7;"
         class="img-fluid">
    <i class="bi bi-bug" style="font-size: 5rem; color: #dc3545;"></i>
    <h1 class="display-1">500</h1>
    <h2>Internal Server Error</h2>
    <p class="lead">Something went wrong on our end. Please try again later.</p>
    <a href="{{ url_for('dashboard') }}" class="btn btn-primary">
        <i class="bi bi-arrow-clockwise"></i> Refresh Dashboard
    </a>
</div>
{% endblock %}
